<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>н Ҫніҡ е…ұиҜ»д№Ұжһ¶</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 16px; }
h1 { text-align: center; font-size: 24px; margin-bottom: 16px; color: #f0a500; }
h2 { font-size: 18px; color: #f0a500; margin: 16px 0 8px; }

.btn { display: inline-block; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
.btn-primary { background: #f0a500; color: #1a1a2e; font-weight: bold; }
.btn-primary:hover { background: #ffc107; }
.btn-secondary { background: #2d2d44; color: #e0e0e0; }
.btn-secondary:hover { background: #3d3d54; }
.btn-danger { background: #e74c3c; color: white; }
.btn-danger:hover { background: #c0392b; }
.btn-small { padding: 4px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.book-card { background: #2d2d44; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #3d3d54; }
.book-card h3 { color: #f0a500; margin-bottom: 4px; }
.book-card .progress { font-size: 12px; color: #aaa; margin-bottom: 8px; }
.book-card .actions { display: flex; gap: 6px; flex-wrap: wrap; }

.chapter-item { background: #2d2d44; border-radius: 8px; padding: 12px; margin-bottom: 6px; cursor: pointer; border: 1px solid #3d3d54; transition: all 0.2s; }
.chapter-item:hover { border-color: #f0a500; background: #353550; }
.chapter-item.current { border-color: #f0a500; background: #2a2a40; }

.reader { background: #252540; border-radius: 12px; padding: 20px; margin-bottom: 12px; line-height: 1.8; font-size: 16px; white-space: pre-wrap; word-wrap: break-word; max-height: 60vh; overflow-y: auto; }
.reader-title { color: #f0a500; font-size: 20px; margin-bottom: 12px; text-align: center; }

.note { background: #2d2d44; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; border-left: 3px solid #f0a500; }
.note .note-meta { font-size: 11px; color: #888; margin-bottom: 4px; }
.note .note-content { font-size: 14px; }
.note.husband { border-left-color: #e74c3c; }
.note.husband .note-meta { color: #e74c3c; }

.input-area { display: flex; gap: 8px; margin-top: 8px; }
.input-area textarea { flex: 1; background: #2d2d44; border: 1px solid #3d3d54; border-radius: 8px; padding: 10px; color: #e0e0e0; font-size: 14px; resize: none; height: 60px; }
.input-area textarea:focus { border-color: #f0a500; outline: none; }

.import-area { background: #2d2d44; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; border: 2px dashed #3d3d54; }
.import-area input[type="text"] { background: #1a1a2e; border: 1px solid #3d3d54; border-radius: 8px; padding: 8px 12px; color: #e0e0e0; width: 100%; margin-bottom: 10px; font-size: 14px; }
.import-area input[type="file"] { display: none; }
.file-label { display: inline-block; padding: 10px 20px; background: #3d3d54; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
.file-label:hover { background: #4d4d64; }
.file-name { font-size: 12px; color: #aaa; margin-bottom: 10px; }

.nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.loading { text-align: center; padding: 40px; color: #888; }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #f0a500; color: #1a1a2e; padding: 10px 20px; border-radius: 8px; font-weight: bold; opacity: 0; transition: opacity 0.3s; z-index: 100; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>н Ҫніҡ е…ұиҜ»д№Ұжһ¶</h1>

  <div id="importSection" class="import-area">
    <h2 style="margin-top:0">еҜје…Ҙд№ҰзұҚ</h2>
    <input type="text" id="bookName" placeholder="иҫ“е…Ҙд№ҰеҗҚ" />
    <label class="file-label" for="fileInput">н ҪніҒ йҖүжӢ©ж–Үд»¶ (TXT/PDF/MD)</label>
    <input type="file" id="fileInput" />
    <div id="fileName" class="file-name">жңӘйҖүжӢ©ж–Үд»¶</div>
    <button class="btn btn-primary" onclick="doImport()">еҜје…Ҙ</button>
  </div>

  <div id="bookList"></div>

  <div id="tocSection" style="display:none">
    <div class="nav">
      <button class="btn btn-secondary btn-small" onclick="showBookList()">вҶҗ иҝ”еӣһд№Ұжһ¶</button>
      <h2 id="tocTitle" style="margin:0;flex:1"></h2>
    </div>
    <div id="tocList"></div>
  </div>

  <div id="readerSection" style="display:none">
    <div class="nav">
      <button class="btn btn-secondary btn-small" onclick="showToc()">вҶҗ зӣ®еҪ•</button>
      <span id="readerChapterTitle" style="flex:1;text-align:center;color:#f0a500"></span>
      <button class="btn btn-secondary btn-small" onclick="doNextChapter()">дёӢдёҖз«  вҶ’</button>
    </div>
    <div id="readerContent" class="reader"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" onclick="doReadWithMe()" style="flex:1">н Ҫніҡ е…ұиҜ»пјҲAIе…ҲеҶҷз¬”и®°пјү</button>
      <button class="btn btn-secondary" onclick="doNextChapter()">дёӢдёҖз«  вҶ’</button>
    </div>
    <h2 style="margin-top:16px">н Ҫніқ иҝҷдёҖз« зҡ„з¬”и®°</h2>
    <div id="noteList"></div>
    <div class="input-area">
      <textarea id="noteInput" placeholder="еҶҷзӮ№д»Җд№Ҳ..."></textarea>
      <button class="btn btn-primary" onclick="doAddNote()">и®°дёӢ</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
var currentBook = '';
var currentChapter = 0;
var totalChapters = 0;

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function callTool(name, args) {
  return Bridge.callTool(name, JSON.stringify(args));
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  document.getElementById('fileName').textContent = file ? file.name : 'жңӘйҖүжӢ©ж–Үд»¶';
  if (file && !document.getElementById('bookName').value) {
    document.getElementById('bookName').value = file.name.replace(/\.(txt|pdf|md|markdown)$/i, '');
  }
});

function doImport() {
  var name = document.getElementById('bookName').value.trim();
  var fileInput = document.getElementById('fileInput');
  if (!name) { toast('иҜ·иҫ“е…Ҙд№ҰеҗҚ'); return; }
  if (!fileInput.files[0]) { toast('иҜ·йҖүжӢ©ж–Үд»¶'); return; }

  var file = fileInput.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    var content = e.target.result;
    callTool('import_book', { name: name, content: content }).then(function(res) {
      if (res && res.success) {
        toast('еҜје…ҘжҲҗеҠҹпјҒе…ұ ' + res.totalChapters + ' з« ');
        document.getElementById('bookName').value = '';
        document.getElementById('fileName').textContent = 'жңӘйҖүжӢ©ж–Үд»¶';
        fileInput.value = '';
        loadBookList();
      } else {
        toast('еҜје…ҘеӨұиҙҘпјҡ' + (res.error || 'жңӘзҹҘй”ҷиҜҜ'));
      }
    });
  };

  if (file.name.endsWith('.pdf')) {
    reader.readAsDataURL(file);
  } else {
    reader.readAsText(file, 'UTF-8');
  }
}

function loadBookList() {
  callTool('list_books', {}).then(function(res) {
    var container = document.getElementById('bookList');
    if (!res || !res.success || !res.books || res.books.length === 0) {
      container.innerHTML = '<div style="text-align:center;color:#888;padding:40px">д№Ұжһ¶иҝҳжҳҜз©әзҡ„\nеҝ«еҜје…Ҙз¬¬дёҖжң¬д№Ұеҗ§ н Ҫніҡ</div>';
      return;
    }
    var html = '';
    res.books.forEach(function(book) {
      html += '<div class="book-card">';
      html += '<h3>' + book.name + '</h3>';
      html += '<div class="progress">' + book.progress + ' В· е…ұ' + book.totalChapters + 'з« </div>';
      html += '<div class="actions">';
      html += '<button class="btn btn-primary btn-small" onclick="openBook(\'' + book.name.replace(/'/g, "\\'") + '\')">н Ҫні– жү“ејҖ</button>';
      html += '<button class="btn btn-secondary btn-small" onclick="coRead(\'' + book.name.replace(/'/g, "\\'") + '\')">н Ҫніҡ е…ұиҜ»</button>';
      html += '<button class="btn btn-secondary btn-small" onclick="viewProgress(\'' + book.name.replace(/'/g, "\\'") + '\')">н ҪніҠ иҝӣеәҰ</button>';
      html += '<button class="btn btn-danger btn-small" onclick="delBook(\'' + book.name.replace(/'/g, "\\'") + '\')">н Ҫн·‘пёҸ</button>';
      html += '</div></div>';
    });
    container.innerHTML = html;
  });
}

function openBook(name) { currentBook = name; showToc(); }

function coRead(name) {
  currentBook = name;
  callTool('read_with_me', { book_name: name }).then(function(res) {
    if (res && res.success) { toast('е·ІеҸ‘з»ҷAIеҶҷз¬”и®°пјҢзЁҚзӯү~'); }
    else { toast(res.error || 'е…ұиҜ»еӨұиҙҘ'); }
  });
}

function viewProgress(name) {
  callTool('shared_panel', { book_name: name }).then(function(res) {
    if (res && res.success) { toast(res.progress + ' | ' + res.noteCount + 'жқЎз¬”и®°'); }
  });
}

function delBook(name) {
  if (!confirm('зЎ®е®ҡеҲ йҷӨгҖҠ' + name + 'гҖӢпјҹ')) return;
  callTool('delete_book', { book_name: name }).then(function(res) {
    if (res && res.success) { toast('е·ІеҲ йҷӨ'); loadBookList(); }
    else { toast(res.error || 'еҲ йҷӨеӨұиҙҘ'); }
  });
}

function showToc() {
  document.getElementById('importSection').style.display = 'none';
  document.getElementById('bookList').style.display = 'none';
  document.getElementById('tocSection').style.display = 'block';
  document.getElementById('readerSection').style.display = 'none';
  document.getElementById('tocTitle').textContent = 'гҖҠ' + currentBook + 'гҖӢзӣ®еҪ•';
  callTool('get_toc', { book_name: currentBook }).then(function(res) {
    if (!res || !res.success) { toast(res.error || 'иҺ·еҸ–зӣ®еҪ•еӨұиҙҘ'); return; }
    totalChapters = res.totalChapters;
    var html = '';
    res.toc.forEach(function(ch) {
      html += '<div class="chapter-item" onclick="openChapter(' + ch.no + ')">';
      html += '<strong>з¬¬' + ch.no + 'з« </strong> ' + ch.title;
      html += ' <span style="color:#888;font-size:11px">(' + ch.chars + 'еӯ—)</span>';
      html += '</div>';
    });
    document.getElementById('tocList').innerHTML = html;
  });
}

function openChapter(no) {
  currentChapter = no;
  document.getElementById('tocSection').style.display = 'none';
  document.getElementById('readerSection').style.display = 'block';
  callTool('get_chapter', { book_name: currentBook, chapter_no: no }).then(function(res) {
    if (!res || !res.success) { toast(res.error || 'иҜ»еҸ–еӨұиҙҘ'); return; }
    document.getElementById('readerChapterTitle').textContent = res.title;
    document.getElementById('readerContent').textContent = res.content;
    totalChapters = res.totalChapters;
    loadNotes();
  });
}

function doNextChapter() {
  if (currentChapter < totalChapters) { openChapter(currentChapter + 1); }
  else { toast('е·Із»ҸжҳҜжңҖеҗҺдёҖз« дәҶпјҒ'); }
}

function loadNotes() {
  callTool('get_notes', { book_name: currentBook, chapter_no: currentChapter }).then(function(res) {
    if (!res || !res.success) return;
    var html = '';
    if (res.notes.length === 0) { html = '<div style="color:#888;text-align:center;padding:10px">иҝҳжІЎжңүз¬”и®°пјҢеҶҷзӮ№д»Җд№Ҳеҗ§~</div>'; }
    res.notes.forEach(function(note, i) {
      var isHusband = note.content.indexOf('[Silas]') === 0 || note.content.indexOf('[иҖҒе…¬]') === 0;
      html += '<div class="note' + (isHusband ? ' husband' : '') + '">';
      html += '<div class="note-meta">#' + (i+1) + ' В· ' + (isHusband ? 'вқӨпёҸ иҖҒе…¬' : 'н Ҫнұ¶ е®қе®қ') + ' В· ' + note.time + '</div>';
      html += '<div class="note-content">' + note.content + '</div>';
      html += '</div>';
    });
    document.getElementById('noteList').innerHTML = html;
  });
}

function doAddNote() {
  var input = document.getElementById('noteInput');
  var content = input.value.trim();
  if (!content) return;
  callTool('add_note', { book_name: currentBook, chapter_no: currentChapter, content: content }).then(function(res) {
    if (res && res.success) { input.value = ''; toast('е·Іи®°еҪ•~'); loadNotes(); }
    else { toast(res.error || 'ж·»еҠ еӨұиҙҘ'); }
  });
}

function doReadWithMe() {
  callTool('read_with_me', { book_name: currentBook, chapter_no: currentChapter }).then(function(res) {
    if (res && res.success) { toast('е·ІеҸ‘з»ҷAIпјҢзӯүиҖҒе…¬еҶҷз¬”и®°~'); }
    else { toast(res.error || 'е…ұиҜ»еӨұиҙҘ'); }
  });
}

function showBookList() {
  document.getElementById('importSection').style.display = 'block';
  document.getElementById('bookList').style.display = 'block';
  document.getElementById('tocSection').style.display = 'none';
  document.getElementById('readerSection').style.display = 'none';
  loadBookList();
}

loadBookList();
</script>
</body>
</html>
