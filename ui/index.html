<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>н†љн≥Ъ еЕ±иѓїдє¶жЮґ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
.app { max-width: 600px; margin: 0 auto; padding: 12px; padding-bottom: 80px; }
.header { text-align: center; padding: 12px 0; }
.header h1 { font-size: 22px; color: #f0a500; }
.header .sub { font-size: 12px; color: #666; margin-top: 2px; }
.page { display: none; }
.page.active { display: block; }
.btn { display: inline-block; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.btn-p { background: #f0a500; color: #1a1a2e; font-weight: 600; }
.btn-p:hover { background: #ffc107; }
.btn-s { background: #2d2d44; color: #ccc; }
.btn-s:hover { background: #3d3d54; }
.btn-d { background: #c0392b; color: white; }
.btn-xs { padding: 4px 8px; font-size: 11px; }
.book { background: #2d2d44; border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid #3d3d54; }
.book .title { color: #f0a500; font-size: 16px; font-weight: 600; }
.book .info { font-size: 11px; color: #888; margin-top: 2px; }
.book .btns { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.import-box { background: #2d2d44; border-radius: 10px; padding: 16px; margin-bottom: 14px; border: 2px dashed #3d3d54; }
.import-box input[type=text] { width: 100%; background: #1a1a2e; border: 1px solid #3d3d54; border-radius: 6px; padding: 8px 10px; color: #e0e0e0; font-size: 14px; margin-bottom: 8px; }
.import-box input[type=text]:focus { border-color: #f0a500; outline: none; }
.import-box textarea { width: 100%; background: #1a1a2e; border: 1px solid #3d3d54; border-radius: 6px; padding: 8px 10px; color: #e0e0e0; font-size: 13px; min-height: 80px; resize: vertical; margin-bottom: 8px; }
.import-box textarea:focus { border-color: #f0a500; outline: none; }
.import-box .hint { font-size: 11px; color: #666; margin-bottom: 8px; }
.ch-item { background: #2d2d44; border-radius: 8px; padding: 10px 12px; margin-bottom: 4px; cursor: pointer; border: 1px solid #3d3d54; }
.ch-item:active { border-color: #f0a500; background: #353550; }
.reader { background: #222240; border-radius: 10px; padding: 16px; line-height: 1.9; font-size: 15px; white-space: pre-wrap; word-wrap: break-word; max-height: 55vh; overflow-y: auto; }
.note { background: #2d2d44; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; border-left: 3px solid #f0a500; }
.note.hus { border-left-color: #e74c3c; }
.note .who { font-size: 10px; color: #888; }
.note.hus .who { color: #e74c3c; }
.note .txt { font-size: 13px; margin-top: 2px; }
.note-input { display: flex; gap: 6px; margin-top: 8px; }
.note-input textarea { flex: 1; background: #2d2d44; border: 1px solid #3d3d54; border-radius: 6px; padding: 8px; color: #e0e0e0; font-size: 13px; resize: none; height: 50px; }
.note-input textarea:focus { border-color: #f0a500; outline: none; }
.nav-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.nav-bar .center { flex: 1; text-align: center; }
.toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #f0a500; color: #1a1a2e; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none; }
.toast.on { opacity: 1; }
.empty { text-align: center; color: #555; padding: 40px 0; font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>н†љн≥Ъ еЕ±иѓїдє¶жЮґ</h1>
    <div class="sub" id="stats">0 жЬђдє¶</div>
  </div>

  <div id="pg-shelf" class="page active">
    <div class="import-box">
      <div style="font-size:15px;font-weight:600;color:#f0a500;margin-bottom:8px">еѓЉеЕ•дє¶з±Н</div>
      <input type="text" id="inp-name" placeholder="дє¶еРН" />
      <textarea id="inp-content" placeholder="з≤Шиііе∞ПиѓіжЦЗжЬђеЖЕеЃєеИ∞ињЩйЗМ...&#10;жФѓжМБ TXT / Markdown ж†ЉеЉП"></textarea>
      <div class="hint">н†љн≤° дєЯеПѓдї•еЬ®иБКе§©дЄ≠иЈЯ AI иѓігАМеѓЉеЕ•xxxдє¶гАНжЭ•еѓЉеЕ•</div>
      <button class="btn btn-p" style="width:100%" onclick="doImport()">еѓЉеЕ•</button>
    </div>
    <div id="book-list"></div>
  </div>

  <div id="pg-toc" class="page">
    <div class="nav-bar">
      <button class="btn btn-s btn-xs" onclick="go('shelf')">вЖР дє¶жЮґ</button>
      <div class="center" id="toc-title" style="color:#f0a500;font-weight:600"></div>
    </div>
    <div id="toc-list"></div>
  </div>

  <div id="pg-read" class="page">
    <div class="nav-bar">
      <button class="btn btn-s btn-xs" onclick="go('toc')">вЖР зЫЃељХ</button>
      <div class="center" id="read-title" style="color:#f0a500;font-weight:600"></div>
      <button class="btn btn-s btn-xs" onclick="goNext()">дЄЛдЄАзЂ†вЖТ</button>
    </div>
    <div class="reader" id="read-body"></div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="btn btn-p" style="flex:1" onclick="doCoRead()">н†љн≥Ц еЕ±иѓї</button>
      <button class="btn btn-s" onclick="goNext()">дЄЛдЄАзЂ†вЖТ</button>
    </div>
    <div style="margin-top:14px;font-size:15px;color:#f0a500;font-weight:600">н†љн≥Э зђФиЃ∞</div>
    <div id="note-list"></div>
    <div class="note-input">
      <textarea id="inp-note" placeholder="еЖЩзВєжДЯжГ≥..."></textarea>
      <button class="btn btn-p" onclick="doNote()">иЃ∞</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var B = '';
var CH = 0;
var TOTAL = 0;

function toast(m) {
  var t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('on');
  setTimeout(function() { t.classList.remove('on'); }, 1800);
}

function go(p) {
  document.querySelectorAll('.page').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('pg-' + p).classList.add('active');
  if (p === 'shelf') loadShelf();
  if (p === 'toc') loadToc();
}

function callTool(name, args) {
  return Bridge.callTool(name, JSON.stringify(args));
}

function doImport() {
  var name = document.getElementById('inp-name').value.trim();
  var content = document.getElementById('inp-content').value.trim();
  if (!name) { toast('иЊУеЕ•дє¶еРН'); return; }
  if (!content) { toast('з≤ШиііеЖЕеЃє'); return; }
  callTool('import_book', { name: name, content: content }).then(function(res) {
    if (res && res.success) {
      toast('еѓЉеЕ•жИРеКЯ! ' + res.totalChapters + ' зЂ†');
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-content').value = '';
      loadShelf();
    } else {
      toast('е§±иі•: ' + ((res && res.error) || ''));
    }
  });
}

function loadShelf() {
  callTool('list_books', {}).then(function(d) {
    document.getElementById('stats').textContent = (d.count || 0) + ' жЬђдє¶';
    var el = document.getElementById('book-list');
    if (!d.success || !d.books || d.books.length === 0) {
      el.innerHTML = '<div class="empty">дє¶жЮґз©Їз©ЇзЪД~<br>ењЂеѓЉеЕ•дЄАжЬђдє¶еРІ</div>';
      return;
    }
    var h = '';
    d.books.forEach(function(b) {
      var n = b.name.replace(/'/g, "\\'");
      h += '<div class="book">';
      h += '<div class="title">' + b.name + '</div>';
      h += '<div class="info">' + b.progress + '</div>';
      h += '<div class="btns">';
      h += '<button class="btn btn-p btn-xs" onclick="openB(\'' + n + '\')">жЙУеЉА</button>';
      h += '<button class="btn btn-s btn-xs" onclick="coRead(\'' + n + '\')">еЕ±иѓї</button>';
      h += '<button class="btn btn-d btn-xs" onclick="delB(\'' + n + '\')">еИ†</button>';
      h += '</div></div>';
    });
    el.innerHTML = h;
  });
}

function openB(n) { B = n; go('toc'); }

function coRead(n) {
  B = n;
  callTool('read_with_me', { book_name: n }).then(function() {
    toast('еЈ≤еПСиµЈеЕ±иѓї~');
  });
}

function delB(n) {
  if (!confirm('еИ†йЩ§гАК' + n + 'гАЛ?')) return;
  callTool('delete_book', { book_name: n }).then(function() { loadShelf(); });
}

function loadToc() {
  document.getElementById('toc-title').textContent = 'гАК' + B + 'гАЛ';
  callTool('get_toc', { book_name: B }).then(function(d) {
    var el = document.getElementById('toc-list');
    if (!d.success || !d.toc) { el.innerHTML = '<div class="empty">еК†иљље§±иі•</div>'; return; }
    TOTAL = d.totalChapters;
    var h = '';
    d.toc.forEach(function(ch) {
      h += '<div class="ch-item" onclick="openCh(' + ch.no + ')">';
      h += '<div style="font-size:14px">зђђ' + ch.no + 'зЂ† ' + ch.title + '</div>';
      h += '<div style="font-size:11px;color:#666">' + ch.chars + ' е≠Ч</div>';
      h += '</div>';
    });
    el.innerHTML = h;
  });
}

function openCh(no) { CH = no; go('read'); loadChapter(); }

function loadChapter() {
  callTool('get_chapter', { book_name: B, chapter_no: CH }).then(function(d) {
    if (!d.success) { toast('иѓїеПЦе§±иі•'); return; }
    TOTAL = d.totalChapters;
    document.getElementById('read-title').textContent = d.title;
    document.getElementById('read-body').textContent = d.content;
    loadNotes();
  });
}

function goNext() {
  if (CH < TOTAL) { CH++; loadChapter(); }
  else toast('жЬАеРОдЄАзЂ†дЇЖ');
}

function doCoRead() {
  callTool('read_with_me', { book_name: B, chapter_no: CH }).then(function() {
    toast('AIеЕ±иѓїдЄ≠~');
  });
}

function loadNotes() {
  callTool('get_notes', { book_name: B, chapter_no: CH }).then(function(d) {
    var el = document.getElementById('note-list');
    if (!d.notes || d.notes.length === 0) {
      el.innerHTML = '<div style="color:#555;text-align:center;padding:8px;font-size:12px">ињШж≤°зђФиЃ∞</div>';
      return;
    }
    var h = '';
    d.notes.forEach(function(n, i) {
      var hus = n.content.indexOf('[Silas]') === 0 || n.content.indexOf('[иАБеЕђ]') === 0;
      h += '<div class="note' + (hus ? ' hus' : '') + '">';
      h += '<div class="who">#' + (i+1) + ' ' + (hus ? 'н†ЊніЦ иАБеЕђ' : 'н†љн±© еЃЭеЃЭ') + '</div>';
      h += '<div class="txt">' + n.content + '</div>';
      h += '</div>';
    });
    el.innerHTML = h;
  });
}

function doNote() {
  var t = document.getElementById('inp-note');
  var c = t.value.trim();
  if (!c) return;
  callTool('add_note', { book_name: B, chapter_no: CH, content: c }).then(function() {
    t.value = '';
    toast('иЃ∞дЄЛдЇЖ~');
    loadNotes();
  });
}

loadShelf();
</script>
</body>
</html>
